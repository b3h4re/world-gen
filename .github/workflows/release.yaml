name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64 zip
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Disable Windows checkout CRLF conversion
        shell: pwsh
        run: |
          git config --global core.autocrlf input

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "VERSION=${{ inputs.tag }}" >> $env:GITHUB_ENV
          } else {
            "VERSION=${{ github.ref_name }}" >> $env:GITHUB_ENV
          }

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            zip
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            qt6-base:p
            glm:p
            vulkan-headers:p
            vulkan-loader:p
            shaderc:p

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWORLD_GEN_PORTABLE_BUILD=ON \
            -DBUILD_TESTING=OFF

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Package Windows zip
        run: |
          DIST="$PWD/dist/world-gen-windows-x64"
          mkdir -p "$DIST"

          if [ ! -f build/world_gen.exe ]; then
            echo "build/world_gen.exe was not found"
            find build -maxdepth 3 -type f
            exit 1
          fi

          cp build/world_gen.exe "$DIST/world_gen.exe"

          if [ -d build/shaders ]; then
            cp -R build/shaders "$DIST/shaders"
          fi

          if [ -d assets ]; then
            cp -R assets "$DIST/assets"
          fi

          WINDEPLOYQT="$(command -v windeployqt6 || command -v windeployqt || true)"

          if [ -z "$WINDEPLOYQT" ]; then
            echo "windeployqt was not found"
            exit 1
          fi

          "$WINDEPLOYQT" \
            --release \
            --compiler-runtime \
            "$DIST/world_gen.exe"

          if [ -f /ucrt64/bin/vulkan-1.dll ]; then
            cp /ucrt64/bin/vulkan-1.dll "$DIST/vulkan-1.dll"
          fi

          cd "$DIST"
          zip -r "$GITHUB_WORKSPACE/world-gen-$VERSION-windows-x64.zip" .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: world-gen-*-windows-x64.zip
          if-no-files-found: error

  macos:
    name: macOS app zip
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Install system dependencies
        shell: bash
        run: |
          brew update
          brew install cmake ninja qt glm shaderc vulkan-headers vulkan-loader molten-vk

          QT_PREFIX="$(brew --prefix qt)"

          echo "QT_PREFIX=$QT_PREFIX" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$QT_PREFIX" >> "$GITHUB_ENV"
          echo "$QT_PREFIX/bin" >> "$GITHUB_PATH"

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DWORLD_GEN_PORTABLE_BUILD=ON \
            -DBUILD_TESTING=OFF

      - name: Build
        shell: bash
        run: |
          cmake --build build --parallel

      - name: Create .app bundle
        shell: bash
        run: |
          APP="$PWD/dist/world_gen.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          if [ ! -f build/world_gen ]; then
            echo "build/world_gen was not found"
            find build -maxdepth 3 -type f
            exit 1
          fi

          cp build/world_gen "$APP/Contents/MacOS/world_gen"
          chmod +x "$APP/Contents/MacOS/world_gen"

          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>world_gen</string>

            <key>CFBundleIdentifier</key>
            <string>io.github.b3h4re.world-gen</string>

            <key>CFBundleName</key>
            <string>world-gen</string>

            <key>CFBundleDisplayName</key>
            <string>world-gen</string>

            <key>CFBundlePackageType</key>
            <string>APPL</string>

            <key>CFBundleVersion</key>
            <string>1.0</string>

            <key>CFBundleShortVersionString</key>
            <string>1.0</string>

            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          if [ -d build/shaders ]; then
            cp -R build/shaders "$APP/Contents/MacOS/shaders"
          fi

          if [ -d assets ]; then
            cp -R assets "$APP/Contents/MacOS/assets"
          fi

          MACDEPLOYQT="$(command -v macdeployqt || true)"

          if [ -z "$MACDEPLOYQT" ]; then
            echo "macdeployqt was not found"
            exit 1
          fi

          "$MACDEPLOYQT" "$APP" -verbose=2

          ditto -c -k --sequesterRsrc --keepParent "$APP" "world-gen-$VERSION-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: world-gen-*-macos.zip
          if-no-files-found: error

  linux-appimage:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        shell: bash
        run: |
          sudo find /etc/apt/sources.list.d \
            -type f \( -name '*microsoft*' -o -name '*azure*' \) \
            -print \
            -delete || true

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-base-dev-tools \
            libvulkan-dev \
            vulkan-tools \
            glslang-tools \
            libglm-dev \
            libfuse2 \
            wget \
            file \
            patchelf

      - name: Provide glslc wrapper through glslangValidator
        shell: bash
        run: |
          sudo tee /usr/local/bin/glslc > /dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" == "--version" ]]; then
            glslangValidator --version
            exit 0
          fi

          out=""
          args=()

          while [[ $# -gt 0 ]]; do
            case "$1" in
              -o)
                out="$2"
                shift 2
                ;;
              *)
                args+=("$1")
                shift
                ;;
            esac
          done

          if [[ -z "$out" ]]; then
            echo "glslc wrapper error: missing -o <output>" >&2
            exit 1
          fi

          exec glslangValidator -V "${args[@]}" -o "$out"
          EOF

          sudo chmod +x /usr/local/bin/glslc
          which glslc
          glslc --version

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWORLD_GEN_PORTABLE_BUILD=ON \
            -DBUILD_TESTING=OFF

      - name: Build
        shell: bash
        run: |
          cmake --build build --parallel

      - name: Prepare AppDir
        shell: bash
        run: |
          APPDIR="$PWD/AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/scalable/apps"

          if [ ! -f build/world_gen ]; then
            echo "build/world_gen was not found"
            find build -maxdepth 3 -type f
            exit 1
          fi

          cp build/world_gen "$APPDIR/usr/bin/world_gen"
          chmod +x "$APPDIR/usr/bin/world_gen"

          if [ -d build/shaders ]; then
            cp -R build/shaders "$APPDIR/usr/bin/shaders"
          fi

          if [ -d assets ]; then
            cp -R assets "$APPDIR/usr/bin/assets"
          fi

          cat > "$APPDIR/usr/share/applications/world-gen.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=world-gen
          Exec=world_gen
          Icon=world-gen
          Categories=Graphics;Science;Qt;
          Terminal=false
          EOF

          cat > "$APPDIR/usr/share/icons/hicolor/scalable/apps/world-gen.svg" <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
            <rect width="256" height="256" rx="48" fill="#20242a"/>
            <path d="M24 188 L72 118 L104 154 L142 92 L232 188 Z" fill="#7fb069"/>
            <path d="M142 92 L170 136 L156 128 Z" fill="#dcecc9"/>
          </svg>
          EOF

      - name: Build AppImage
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          QMAKE: /usr/lib/qt6/bin/qmake6
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage

          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/world_gen \
            --desktop-file AppDir/usr/share/applications/world-gen.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/world-gen.svg \
            --plugin qt \
            --output appimage

          APPIMAGE="$(find . -maxdepth 1 -name '*.AppImage' -type f | head -n 1)"

          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage was produced"
            exit 1
          fi

          mv "$APPIMAGE" "world-gen-$VERSION-linux-x86_64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: world-gen-*-linux-x86_64.AppImage
          if-no-files-found: error

  source-archive:
    name: Source archive
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Create source archive
        shell: bash
        run: |
          git archive \
            --format=zip \
            --prefix="world-gen-$VERSION/" \
            HEAD \
            -o "world-gen-$VERSION-source.zip"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: world-gen-*-source.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - windows
      - macos
      - linux-appimage
      - source-archive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show release artifacts
        shell: bash
        run: |
          find release-artifacts -maxdepth 2 -type f -print

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" release-artifacts/* --clobber
          else
            gh release create "$VERSION" release-artifacts/* \
              --title "$VERSION" \
              --notes "Automated release for $VERSION"
          fi