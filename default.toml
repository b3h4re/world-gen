[window]
width=1280
height=720
present_mode="vsync"
fps_max=144

[terrain]
set_seed=true
seed=1234
width=1000
height=1000

[terrain.perlin]
dots_per_cell=100

[terrain.simplex]
dots_per_cell=100

[terrain.wavelet]
frequency=0.014231234

[terrain.worley]
dots_per_cell=100
p=2.0
num_points=1

[terrain.dla]
num_steps=5
height_scale=0.15
fill=0.25
jiggle=0.021

[planet]
resolution=0
# Planet radius, generator scale, and generator bias are meters in this mode.
height_mode="physical_meters"
radius=10.0
skirt_depth_multiplier=1.0
lod_transition_seconds=0.25
lod_transition_time_scale=1.0
# Selection is capped at 30 Hz; visibility and morphing still update every frame.
lod_selection_interval_seconds=0.0333333
# At most 16 patches are generated concurrently and four are uploaded per
# steady-state frame. Epoch replacement uploads all six root fallbacks atomically.
lod_patch_generation_budget=8
lod_patch_upload_budget=4
lod_maximum_concurrent_patch_jobs=2
compute_method="vulkan_compute"
perlin_cell_size=1.0
octaves=5
lacunarity=2.0
persistence=0.5
